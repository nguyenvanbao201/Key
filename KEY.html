<script>
function createKey() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key = "VTH-";

    for(let i = 0; i < 10; i++) {
        key += chars[Math.floor(Math.random() * chars.length)];
    }

    return key;
}

function getToday() {
    return new Date().toISOString().split('T')[0];
}

function getKey() {
    let lastDay = localStorage.getItem("last_day");
    let today = getToday();
    let savedKey = localStorage.getItem("user_key");

    // Đã lấy key hôm nay
    if(lastDay === today && savedKey) {
        document.getElementById("msg").innerHTML =
            "Key hôm nay: <b>" + savedKey + "</b><br><br>" +
            "⚠️ Bạn đã lấy key hôm nay rồi!";
        return;
    }

    // Tạo key mới
    let key = createKey();

    localStorage.setItem("user_key", key);
    localStorage.setItem("last_day", today);

    document.getElementById("msg").innerHTML =
        "Key của bạn: <b>" + key + "</b>";
}

let savedKey = localStorage.getItem("user_key");
let lastDay = localStorage.getItem("last_day");

if(savedKey && lastDay === getToday()) {
    document.getElementById("msg").innerHTML =
        "Key hôm nay: <b>" + savedKey + "</b>";
}
</script>
