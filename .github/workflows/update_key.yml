name: Update Daily Key

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate Key
        run: |
          KEY="VB-$(openssl rand -hex 4 | tr a-z A-Z)"
          DATE=$(date +%F)

          cat > daily_key.json << EOF
          {
            "date": "$DATE",
            "key": "$KEY"
          }
          EOF

      - name: Commit Changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add daily_key.json
          git commit -m "Update daily key" || exit 0
          git push
