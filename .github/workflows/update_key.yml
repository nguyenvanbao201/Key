name: Update Daily Key

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate New Key
        run: |
          KEY="VBTOOL-$(openssl rand -hex 5 | tr a-z A-Z)"
          echo "$KEY" > daily_key.txt

      - name: Commit Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add daily_key.txt

          git diff --staged --quiet || git commit -m "Update daily key"

          git push
