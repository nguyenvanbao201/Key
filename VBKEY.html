<script>
    function randomKey(length = 12) {
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        let key = "VTH-";

        for (let i = 0; i < length; i++) {
            key += chars[Math.floor(Math.random() * chars.length)];
        }

        return key;
    }

    function getKey() {
        const oldKey = localStorage.getItem("user_key");
        const expire = localStorage.getItem("expire_time");

        // Nếu key cũ còn hạn thì dùng lại
        if (oldKey && expire && Date.now() < Number(expire)) {
            document.getElementById("result").innerText =
                "Key hiện tại: " + oldKey;
            return;
        }

        // Tạo key mới khi chưa có hoặc đã hết hạn
        const newKey = randomKey();
        const newExpire = Date.now() + 24 * 60 * 60 * 1000;

        localStorage.setItem("user_key", newKey);
        localStorage.setItem("expire_time", newExpire);

        document.getElementById("result").innerText =
            "Key: " + newKey;
    }

    // Tự hiển thị key khi tải trang
    const key = localStorage.getItem("user_key");
    const expire = localStorage.getItem("expire_time");

    if (key && expire && Date.now() < Number(expire)) {
        document.getElementById("result").innerText =
            "Key hiện tại: " + key;
    }
</script>
